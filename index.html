<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>

<style>
    body {
        background: #0d0d0d;
        color: #f2f2f2;
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 2rem;
    }

    input, button {
        width: 90%;
        max-width: 400px;
        padding: 12px;
        margin: 10px auto;
        border-radius: 8px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: #fff;
        font-size: 1rem;
        display: block;
    }

    button {
        cursor: pointer;
        transition: 0.25s;
    }

    button:hover {
        background: #222;
        border-color: #666;
        transform: translateY(-2px);
    }

    #preview-container {
        margin-top: 30px;
    }

    #qr-title {
        font-size: 1.4rem;
        margin-bottom: 10px;
    }

    canvas {
        margin-top: 10px;
        background: #fff;
        padding: 10px;
        border-radius: 12px;
    }

    #downloadBtn {
        margin-top: 20px;
        display: none;
    }
</style>

</head>
<body>

<h1>QR Code Generator</h1>

<input type="text" id="titleInput" placeholder="Enter Title">
<input type="text" id="linkInput" placeholder="Enter Link (URL)">
<input type="file" id="imageUpload" accept="image/*">

<button onclick="generateQR()">Create QR Code</button>

<div id="preview-container">
    <div id="qr-title"></div>
    <canvas id="qrCanvas"></canvas>
</div>

<button id="downloadBtn" onclick="downloadQR()">Download QR Code</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function generateQR() {
    const title = document.getElementById("titleInput").value;
    const link = document.getElementById("linkInput").value;
    const imageFile = document.getElementById("imageUpload").files[0];

    if (!link) {
        alert("Please enter a link");
        return;
    }

    document.getElementById("qr-title").innerText = title;

    const canvas = document.getElementById("qrCanvas");
    const ctx = canvas.getContext("2d");

    const qrSize = 500;
    canvas.width = qrSize;
    canvas.height = qrSize;

    // Generate QR code on hidden element
    const tempDiv = document.createElement("div");
    const qr = new QRCode(tempDiv, {
        text: link,
        width: qrSize,
        height: qrSize,
        correctLevel: QRCode.CorrectLevel.H
    });

    setTimeout(() => {
        const qrImg = tempDiv.querySelector("img") || tempDiv.querySelector("canvas");
        const qrImage = new Image();
        qrImage.src = qrImg.src;

        qrImage.onload = () => {
            ctx.drawImage(qrImage, 0, 0, qrSize, qrSize);

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const uploadedImg = new Image();
                    uploadedImg.src = e.target.result;

                    uploadedImg.onload = () => {
                        const imgSize = qrSize * 0.25; // 25% of QR size
                        const x = (qrSize - imgSize) / 2;
                        const y = (qrSize - imgSize) / 2;

                        ctx.beginPath();
                        ctx.arc(x + imgSize/2, y + imgSize/2, imgSize/2 + 10, 0, Math.PI * 2);
                        ctx.fillStyle = "#fff";
                        ctx.fill();

                        ctx.drawImage(uploadedImg, x, y, imgSize, imgSize);
                        document.getElementById("downloadBtn").style.display = "block";
                    };
                };
                reader.readAsDataURL(imageFile);
            } else {
                document.getElementById("downloadBtn").style.display = "block";
            }
        };
    }, 300);
}

function downloadQR() {
    const canvas = document.getElementById("qrCanvas");
    const link = document.createElement("a");
    link.download = "qr_code.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
